<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sister 🎂</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:white;
}

h1{
    margin-top:30px;
    font-size:40px;
}

.slideshow{
    width:320px;
    height:400px;
    margin:40px auto;
    position:relative;
}

.slideshow img{
    width:100%;
    height:100%;
    position:absolute;
    border-radius:20px;
    box-shadow:0 0 20px white;
    opacity:0;
    transition:1s;
}

.show{
    opacity:1;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff4081;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#e91e63;
}

#message{
    display:none;
    margin-top:20px;
    font-size:22px;
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday My Dear Sister 🎉</h1>

<div class="slideshow">
    <!-- YOUR IMAGES -->
    <img class="show" src="Screenshot (6).png">
    <img src="Screenshot (8).png">
</div>

<button onclick="showMessage()">Click Surprise 🎁</button>

<div id="message">
    💖 You are the best sister in the world! 💖<br>
    May your life be full of happiness and success 🎂🎉
</div>

<audio autoplay loop>
    <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script>
let slides = document.querySelectorAll(".slideshow img");
let index = 0;

setInterval(function(){
    slides[index].classList.remove("show");
    index = (index + 1) % slides.length;
    slides[index].classList.add("show");
},3000);

function showMessage(){
    document.getElementById("message").style.display="block";
}
</script>

</body>
</html>
