<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sister 🎉</title>

<style>
body{
    margin:0;
    font-family: Arial;
    text-align:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:white;
}

h1{
    margin-top:40px;
    font-size:45px;
}

.slideshow{
    width:320px;
    height:400px;
    margin:40px auto;
    position:relative;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:20px;
    box-shadow:0 0 20px white;
    opacity:0;
    transition:1s;
}

.active{
    opacity:1;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff4081;
    color:white;
    cursor:pointer;
}

.message{
    display:none;
    margin-top:20px;
    font-size:20px;
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday My Dear Sister 🎂</h1>

<div class="slideshow">
    <!-- CHANGE THESE IMAGES -->
    <img class="slide active" src="photo1.jpg">
    <img class="slide" src="photo2.jpg">
    <img class="slide" src="photo3.jpg">
    <img class="slide" src="photo4.jpg">
</div>

<button onclick="showMessage()">Click Surprise 🎁</button>

<div class="message" id="msg">
    💖 You are the best sister ever!  
    May your life be full of happiness and success! 🎉
</div>

<audio autoplay loop>
    <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(()=>{
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
},3000);

function showMessage(){
    document.getElementById("msg").style.display="block";
}
</script>

</body>
</html>
